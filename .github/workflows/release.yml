name: Build and Release

on:
  push:
    tags:
      - 'v*' # 当推送 v 开头的 tag 时触发，如 v0.1.0, v1.0.0
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [windows, macos, linux]
        include:
          - platform: windows
            args: ''
            target: ''
          - platform: macos
            args: '--target universal-apple-darwin'
            target: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: linux
            args: ''
            target: ''

    runs-on: ${{ matrix.platform }}-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'FM Tester ${{ github.ref_name }}'
          releaseBody: |
            ## 安装说明

            ### Windows
            - 下载 `.msi` 或 `.exe` 安装包
            - 双击安装

            ### macOS
            - 下载 `.dmg` 文件
            - 双击打开，拖拽到 Applications

            ### Linux
            - 下载 `.deb` 或 `.AppImage` 文件
            - `.deb`: `sudo dpkg -i fm-tester_*.deb`
            - `.AppImage`: `chmod +x fm-tester_*.AppImage && ./fm-tester_*.AppImage`

            ## 更新日志
            查看 [commits](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) 了解详情。
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}