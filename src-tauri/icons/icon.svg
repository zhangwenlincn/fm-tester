<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- 圆角矩形背景 -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="#1890ff"/>
  
  <!-- 中心服务器节点 -->
  <circle cx="256" cy="256" r="72" fill="white"/>
  
  <!-- 左侧发送箭头（向右） -->
  <polygon points="64,256 144,200 144,232 200,232 200,280 144,280 144,312" fill="#69c0ff"/>
  
  <!-- 右侧接收箭头（向左） -->
  <polygon points="448,256 368,200 368,232 312,232 312,280 368,280 368,312" fill="#69c0ff"/>
  
  <!-- 上方数据流 -->
  <circle cx="256" cy="104" r="28" fill="#40a9ff"/>
  
  <!-- 下方数据流 -->
  <circle cx="256" cy="408" r="28" fill="#40a9ff"/>
</svg>